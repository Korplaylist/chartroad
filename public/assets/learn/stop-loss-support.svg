<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">지지선 아래 손절 기준</title>
  <desc id="desc">지지 구간 아래에 손절 기준을 두고 가격이 지지 실패를 보이는 상황을 설명하는 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <rect x="60" y="52" width="840" height="436" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="96" y="110" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">손절선은 차트 근거가 깨지는 위치에 둡니다</text>
  <rect x="116" y="286" width="724" height="56" rx="10" fill="#eaf8f3" stroke="#69a88d"/>
  <text x="132" y="322" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#146b5f">지지 구간</text>
  <line x1="116" y1="378" x2="840" y2="378" stroke="#b64a4a" stroke-width="5" stroke-dasharray="12 9"/>
  <text x="132" y="410" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#9d3e3e">손절선: 지지 실패를 인정하는 위치</text>
  <path d="M130 276 C190 220 248 208 304 238 C350 262 390 320 446 314 C508 306 554 252 606 282 C656 310 700 348 758 384 C790 404 818 410 842 418" fill="none" stroke="#132321" stroke-width="7" stroke-linecap="round"/>
</svg>
