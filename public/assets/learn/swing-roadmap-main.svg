<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">스윙 학습 시간축</title>
  <desc id="desc">주봉 일봉 4시간봉을 연결해 스윙 학습 순서를 보여주는 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/><rect x="56" y="42" width="848" height="456" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="92" y="94" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#132321">스윙은 큰 방향과 일봉 위치를 먼저 봅니다</text>
  <g font-family="Arial, sans-serif"><rect x="110" y="150" width="210" height="240" rx="16" fill="#f7f4ec" stroke="#d7d8cc"/><text x="142" y="204" font-size="28" font-weight="800" fill="#345995">주봉</text><text x="142" y="250" font-size="20">큰 추세</text><text x="142" y="284" font-size="20">주요 가격대</text><rect x="374" y="150" width="210" height="240" rx="16" fill="#f7f4ec" stroke="#d7d8cc"/><text x="406" y="204" font-size="28" font-weight="800" fill="#c98d2e">일봉</text><text x="406" y="250" font-size="20">진입 후보</text><text x="406" y="284" font-size="20">거래량 확인</text><rect x="638" y="150" width="210" height="240" rx="16" fill="#f7f4ec" stroke="#d7d8cc"/><text x="670" y="204" font-size="28" font-weight="800" fill="#146b5f">4시간봉</text><text x="670" y="250" font-size="20">세부 위치</text><text x="670" y="284" font-size="20">손절 기준</text></g>
</svg>
