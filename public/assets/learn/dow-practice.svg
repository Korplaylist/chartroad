<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">고점 저점 구조 연습지</title>
  <desc id="desc">최근 고점과 저점, HH HL LH LL, 구조 변화 여부를 기록하는 연습지 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/><rect x="60" y="50" width="840" height="440" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="96" y="106" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">고점·저점 구조 관찰 연습</text>
  <text x="96" y="144" font-family="Arial, sans-serif" font-size="20" fill="#5b6663">고점과 저점을 표시하면 추세가 말로 설명되기 시작합니다.</text>
  <g font-family="Arial, sans-serif" font-size="21" fill="#132321">
    <rect x="96" y="188" width="768" height="56" rx="12" fill="#f7f4ec" stroke="#d7d8cc"/><text x="122" y="224">1. 최근 의미 있는 고점 2개와 저점 2개를 표시했나요?</text>
    <rect x="96" y="260" width="768" height="56" rx="12" fill="#f7f4ec" stroke="#d7d8cc"/><text x="122" y="296">2. 고점은 높아지고 있나요, 낮아지고 있나요?</text>
    <rect x="96" y="332" width="768" height="56" rx="12" fill="#f7f4ec" stroke="#d7d8cc"/><text x="122" y="368">3. 저점은 높아지고 있나요, 낮아지고 있나요?</text>
    <rect x="96" y="404" width="768" height="56" rx="12" fill="#f7f4ec" stroke="#d7d8cc"/><text x="122" y="440">4. 구조가 유지되는 조건과 깨지는 조건은 무엇인가요?</text>
  </g>
</svg>
