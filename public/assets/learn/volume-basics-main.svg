  <text x="84" y="140" fill="#64706b" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="18">캔들이 가격의 모양이라면, 거래량은 그 움직임에 얼마나 많은 참여가 있었는지 보여줍니다.</text>
