<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">차트 용어 기초 사전</title>
  <desc id="desc">캔들, 거래량, 지지, 저항, 돌파, 이탈, 눌림 같은 차트 용어를 실제 차트 위에 표시한 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/><rect x="56" y="42" width="848" height="456" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="92" y="96" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#132321">차트 용어는 실제 차트 위에서 익히면 쉽습니다</text>
  <rect x="112" y="182" width="720" height="54" rx="10" fill="#fff3da" stroke="#c98d2e"/><text x="128" y="216" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#8b5a16">저항 / 돌파</text>
  <rect x="112" y="326" width="720" height="54" rx="10" fill="#eaf8f3" stroke="#69a88d"/><text x="128" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#146b5f">지지 / 이탈</text>
  <path d="M126 338 C190 264 244 246 304 280 C354 308 404 212 462 232 C516 252 560 174 620 190 C684 208 724 158 836 132" fill="none" stroke="#132321" stroke-width="6"/>
  <text x="492" y="280" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#132321">눌림</text><text x="650" y="146" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#132321">추세</text>
  <g fill="#9da59f"><rect x="130" y="430" width="28" height="32"/><rect x="220" y="410" width="28" height="52"/><rect x="310" y="420" width="28" height="42"/><rect x="400" y="390" width="28" height="72"/><rect x="490" y="412" width="28" height="50"/><rect x="580" y="380" width="28" height="82"/><rect x="670" y="398" width="28" height="64"/><rect x="760" y="370" width="28" height="92"/></g>
</svg>
