  <g fill="#9da59f"><rect x="130" y="420" width="26" height="72"/><rect x="198" y="406" width="26" height="86"/><rect x="266" y="430" width="26" height="62"/><rect x="334" y="392" width="26" height="100"/><rect x="402" y="414" width="26" height="78"/><rect x="470" y="438" width="26" height="54"/><rect x="538" y="452" width="26" height="40"/><rect x="606" y="458" width="26" height="34"/><rect x="674" y="432" width="26" height="60"/><rect x="742" y="406" width="26" height="86"/></g>
