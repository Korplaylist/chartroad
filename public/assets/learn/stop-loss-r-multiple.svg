<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">1R 손실 기준</title>
  <desc id="desc">진입가와 손절가 사이의 손실폭을 1R로 보고 목표가까지의 손익비를 계산하는 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="64" y="74" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">손절폭을 알면 1R 기준이 생깁니다</text>
  <rect x="92" y="120" width="776" height="350" rx="20" fill="#fffefa" stroke="#d7d8cc"/>
  <line x1="160" y1="196" x2="800" y2="196" stroke="#146b5f" stroke-width="5"/>
  <line x1="160" y1="296" x2="800" y2="296" stroke="#c98d2e" stroke-width="5"/>
  <line x1="160" y1="396" x2="800" y2="396" stroke="#b64a4a" stroke-width="5"/>
  <text x="180" y="188" font-family="Arial, sans-serif" font-size="23" font-weight="800" fill="#146b5f">목표가 12,000원</text>
  <text x="180" y="288" font-family="Arial, sans-serif" font-size="23" font-weight="800" fill="#8b5a16">진입가 10,000원</text>
  <text x="180" y="388" font-family="Arial, sans-serif" font-size="23" font-weight="800" fill="#9d3e3e">손절가 9,000원</text>
  <path d="M720 296 L720 396" stroke="#9d3e3e" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="740" y="354" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#9d3e3e">1R</text>
  <path d="M650 296 L650 196" stroke="#146b5f" stroke-width="5" marker-end="url(#arrow2)"/>
  <text x="670" y="252" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#146b5f">2R</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 0 L5 10 z" fill="#9d3e3e"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M5 0 L10 10 L0 10 z" fill="#146b5f"/>
    </marker>
  </defs>
</svg>
