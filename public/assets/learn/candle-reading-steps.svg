<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="캔들을 읽는 순서를 색보다 위치, 몸통과 꼬리, 거래량 연결 순서로 설명한 이미지">
  <rect width="960" height="540" rx="24" fill="#faf8f2"/>
  <rect x="40" y="42" width="880" height="456" rx="22" fill="#ffffff" stroke="#d9ded4"/>
  <text x="86" y="104" fill="#152323" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="32" font-weight="800">캔들을 읽는 순서</text>
  <text x="86" y="140" fill="#64706b" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="18">캔들 색보다 먼저 위치와 맥락을 확인하면 해석이 훨씬 안정적입니다.</text>
  <g font-family="Pretendard, Noto Sans KR, Arial, sans-serif">
    <g transform="translate(82 205)">
      <rect width="230" height="190" rx="18" fill="#eef3ed" stroke="#d9ded4"/>
      <circle cx="38" cy="42" r="18" fill="#28706c"/>
      <text x="38" y="49" text-anchor="middle" fill="#fff" font-size="20" font-weight="800">1</text>
      <text x="70" y="50" fill="#152323" font-size="22" font-weight="800">가격 위치</text>
      <path d="M50 135 C90 82 126 168 182 104" fill="none" stroke="#c48a2c" stroke-width="7" stroke-linecap="round"/>
      <line x1="42" y1="150" x2="190" y2="150" stroke="#28706c" stroke-width="4" stroke-dasharray="8 7"/>
      <text x="50" y="178" fill="#64706b" font-size="16">지지·저항 근처인지 확인</text>
    </g>
    <g transform="translate(365 205)">
      <rect width="230" height="190" rx="18" fill="#fff8e9" stroke="#d9ded4"/>
      <circle cx="38" cy="42" r="18" fill="#c48a2c"/>
      <text x="38" y="49" text-anchor="middle" fill="#17120b" font-size="20" font-weight="800">2</text>
      <text x="70" y="50" fill="#152323" font-size="22" font-weight="800">몸통과 꼬리</text>
      <line x1="115" y1="82" x2="115" y2="158" stroke="#152323" stroke-width="6" stroke-linecap="round"/>
      <rect x="86" y="104" width="58" height="34" rx="8" fill="#28706c"/>
      <text x="48" y="178" fill="#64706b" font-size="16">밀렸는지, 회복했는지 보기</text>
    </g>
    <g transform="translate(648 205)">
      <rect width="230" height="190" rx="18" fill="#f7eeee" stroke="#d9ded4"/>
      <circle cx="38" cy="42" r="18" fill="#b85f55"/>
      <text x="38" y="49" text-anchor="middle" fill="#fff" font-size="20" font-weight="800">3</text>
      <text x="70" y="50" fill="#152323" font-size="22" font-weight="800">거래량 연결</text>
      <rect x="60" y="130" width="24" height="32" rx="5" fill="#28706c"/>
      <rect x="100" y="96" width="24" height="66" rx="5" fill="#28706c"/>
      <rect x="140" y="72" width="24" height="90" rx="5" fill="#b85f55"/>
      <text x="50" y="178" fill="#64706b" font-size="16">움직임에 힘이 있었는지 확인</text>
    </g>
  </g>
</svg>
