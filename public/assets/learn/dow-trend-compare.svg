    <g transform="translate(644 112)"><rect width="272" height="340" rx="18" fill="#fffefa" stroke="#d7d8cc"/><text x="24" y="44" font-size="25" font-weight="800" fill="#8b5a16">횡보 구조</text><rect x="32" y="126" width="210" height="112" rx="10" fill="#fff3da" stroke="#c98d2e"/><path d="M40 220 C70 142 110 130 146 180 C182 232 214 224 238 150" fill="none" stroke="#132321" stroke-width="5"/><text x="56" y="270" font-size="18" font-weight="800" fill="#8b5a16">상단과 하단 반복</text></g>
