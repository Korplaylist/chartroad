<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">저항이 지지로 바뀌는 역할 전환</title>
  <desc id="desc">저항 구간을 돌파한 뒤 되돌림에서 같은 구간이 지지로 바뀌는 과정을 보여주는 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <rect x="62" y="50" width="836" height="438" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="96" y="108" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">저항은 돌파 후 지지로 바뀔 수 있습니다</text>
  <text x="96" y="146" font-family="Arial, sans-serif" font-size="20" fill="#5b6663">중요한 것은 돌파 자체보다 되돌림에서 같은 구간을 지켜주는지입니다.</text>
  <rect x="116" y="262" width="730" height="56" rx="10" fill="#fff3da" stroke="#c98d2e"/>
  <text x="128" y="298" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#8b5a16">이전 저항 구간 → 돌파 후 지지 확인 구간</text>
  <path d="M128 370 C192 310 242 296 292 304 C348 314 384 286 428 288 C480 290 510 220 556 206 C600 194 638 236 676 262 C724 296 772 290 840 232" fill="none" stroke="#132321" stroke-width="7" stroke-linecap="round"/>
  <path d="M502 244 L550 208 L618 226" fill="none" stroke="#146b5f" stroke-width="5"/>
  <path d="M674 262 C704 292 740 302 782 286" fill="none" stroke="#146b5f" stroke-width="5"/>
  <text x="516" y="196" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#146b5f">돌파</text>
  <text x="702" y="352" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#146b5f">되돌림 지지</text>
</svg>
