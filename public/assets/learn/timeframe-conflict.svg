<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">시간축 판단 충돌 예시</title>
  <desc id="desc">분봉에서는 상승처럼 보이지만 일봉에서는 저항 아래에 있는 상황을 비교한 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="62" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">분봉은 강해 보여도 일봉 저항 아래일 수 있습니다</text>
  <g transform="translate(58 116)">
    <rect width="394" height="350" rx="18" fill="#fffefa" stroke="#d7d8cc"/>
    <text x="32" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#146b5f">분봉</text>
    <path d="M42 270 C92 230 126 210 170 176 C218 138 268 114 350 78" fill="none" stroke="#132321" stroke-width="7" stroke-linecap="round"/>
    <text x="42" y="314" font-family="Arial, sans-serif" font-size="21" fill="#132321">짧게 보면 강한 상승처럼 보임</text>
  </g>
  <g transform="translate(508 116)">
    <rect width="394" height="350" rx="18" fill="#fffefa" stroke="#d7d8cc"/>
    <text x="32" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#c98d2e">일봉</text>
    <rect x="42" y="92" width="310" height="58" rx="10" fill="#fff3eb" stroke="#d19169"/>
    <text x="62" y="128" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#9d4b25">상위 저항 구간</text>
    <path d="M42 260 C98 216 150 196 206 172 C250 154 294 150 350 142" fill="none" stroke="#132321" stroke-width="7" stroke-linecap="round"/>
    <text x="42" y="314" font-family="Arial, sans-serif" font-size="21" fill="#132321">멀리 보면 아직 저항 아래</text>
  </g>
</svg>
