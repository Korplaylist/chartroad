<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="캔들 관찰 연습을 위한 5단계 워크시트 이미지">
  <rect width="960" height="540" rx="24" fill="#faf8f2"/>
  <rect x="40" y="42" width="880" height="456" rx="22" fill="#fff" stroke="#d9ded4"/>
  <text x="84" y="104" fill="#152323" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="32" font-weight="800">캔들 관찰 연습지</text>
  <text x="84" y="140" fill="#64706b" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="18">차트를 맞히려 하지 말고 같은 기준으로 반복해서 관찰하는 연습입니다.</text>
  <g font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="19">
    <g transform="translate(92 195)">
      <rect width="776" height="52" rx="12" fill="#eef3ed" stroke="#d9ded4"/>
      <circle cx="30" cy="26" r="16" fill="#28706c"/><text x="30" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">1</text>
      <text x="60" y="33" fill="#152323" font-weight="700">최근 캔들 10개를 고릅니다.</text>
    </g>
    <g transform="translate(92 258)">
      <rect width="776" height="52" rx="12" fill="#fff8e9" stroke="#d9ded4"/>
      <circle cx="30" cy="26" r="16" fill="#c48a2c"/><text x="30" y="33" text-anchor="middle" fill="#17120b" font-size="18" font-weight="800">2</text>
      <text x="60" y="33" fill="#152323" font-weight="700">몸통이 긴 캔들, 위꼬리, 아래꼬리를 표시합니다.</text>
    </g>
    <g transform="translate(92 321)">
      <rect width="776" height="52" rx="12" fill="#eef3ed" stroke="#d9ded4"/>
      <circle cx="30" cy="26" r="16" fill="#28706c"/><text x="30" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">3</text>
      <text x="60" y="33" fill="#152323" font-weight="700">캔들이 나온 위치를 적습니다. 지지선, 저항선, 박스권, 고점권.</text>
    </g>
    <g transform="translate(92 384)">
      <rect width="776" height="52" rx="12" fill="#f7eeee" stroke="#d9ded4"/>
      <circle cx="30" cy="26" r="16" fill="#b85f55"/><text x="30" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">4</text>
      <text x="60" y="33" fill="#152323" font-weight="700">그날 거래량이 이전보다 늘었는지 확인합니다.</text>
    </g>
    <g transform="translate(92 447)">
      <rect width="776" height="52" rx="12" fill="#eef3ed" stroke="#d9ded4"/>
      <circle cx="30" cy="26" r="16" fill="#28706c"/><text x="30" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">5</text>
      <text x="60" y="33" fill="#152323" font-weight="700">다음 캔들이 어떻게 이어졌는지 기록합니다.</text>
    </g>
  </g>
</svg>
