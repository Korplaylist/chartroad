<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">선보다 구간으로 보는 지지 저항</title>
  <desc id="desc">얇은 선 하나보다 넓은 가격 구간으로 지지와 저항을 표시하는 방법을 비교한 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#132321">한 줄보다 가격대로 표시하면 흔들림을 덜 오해합니다</text>
  <g transform="translate(58 116)">
    <rect width="394" height="354" rx="18" fill="#fffefa" stroke="#d7d8cc"/>
    <text x="32" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#9d3e3e">초보자의 실수</text>
    <line x1="42" y1="178" x2="352" y2="178" stroke="#c0392b" stroke-width="4" stroke-dasharray="10 8"/>
    <path d="M52 270 C96 190 132 174 170 190 C210 210 242 154 278 168 C312 182 324 202 350 192" fill="none" stroke="#132321" stroke-width="6"/>
    <text x="42" y="318" font-family="Arial, sans-serif" font-size="20" fill="#132321">꼬리 하나가 선을 넘었다고</text>
    <text x="42" y="346" font-family="Arial, sans-serif" font-size="20" fill="#132321">바로 돌파나 이탈로 착각하기 쉽습니다.</text>
  </g>
  <g transform="translate(508 116)">
    <rect width="394" height="354" rx="18" fill="#fffefa" stroke="#d7d8cc"/>
    <text x="32" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#146b5f">좋은 기준</text>
    <rect x="42" y="146" width="310" height="64" rx="10" fill="#eaf8f3" stroke="#69a88d"/>
    <path d="M52 270 C96 190 132 174 170 190 C210 210 242 154 278 168 C312 182 324 202 350 192" fill="none" stroke="#132321" stroke-width="6"/>
    <text x="42" y="318" font-family="Arial, sans-serif" font-size="20" fill="#132321">여러 번 반응한 폭을 구간으로 보고</text>
    <text x="42" y="346" font-family="Arial, sans-serif" font-size="20" fill="#132321">종가와 거래량까지 함께 확인합니다.</text>
  </g>
</svg>
