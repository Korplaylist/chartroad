      <rect x="64" y="180" width="22" height="32" rx="4" fill="#28706c"/><rect x="104" y="168" width="22" height="44" rx="4" fill="#28706c"/><rect x="144" y="138" width="22" height="74" rx="4" fill="#28706c"/>
      <rect x="184" y="118" width="22" height="94" rx="4" fill="#28706c"/><rect x="224" y="146" width="22" height="66" rx="4" fill="#28706c"/>
