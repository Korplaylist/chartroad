  <path d="M126 334 C194 282 248 256 310 276 C370 296 422 218 484 234 C548 250 590 184 656 202 C718 218 760 166 836 142" fill="none" stroke="#132321" stroke-width="6"/>
  <path d="M126 364 C240 330 330 300 440 268 C560 232 680 204 836 176" fill="none" stroke="#c98d2e" stroke-width="5"/>
