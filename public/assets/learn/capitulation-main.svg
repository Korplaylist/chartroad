<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">바닥권 투매 거래량</title>
  <desc id="desc">하락 후 바닥권에서 거래량이 폭증하고 아래꼬리가 생기는 실제 차트형 이미지</desc>
  <rect width="960" height="540" fill="#f7f4ec"/><rect x="56" y="42" width="848" height="456" rx="22" fill="#fffefa" stroke="#d7d8cc"/>
  <text x="92" y="94" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#132321">바닥권 투매 거래량은 회복 확인이 필요합니다</text>
