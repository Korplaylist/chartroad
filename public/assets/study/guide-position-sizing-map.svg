<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}.label{fill:#fff;font-size:16px;font-weight:700}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><text class="txt big" x="72" y="94">Position Size Changes by Stop Width</text><rect class="zone" x="120" y="150" width="310" height="250" rx="20"/><rect class="risk" x="530" y="150" width="310" height="250" rx="20"/><text class="txt mid" x="155" y="215">Tight Stop</text><text class="txt small" x="155" y="270">Same 1R account risk</text><text class="txt small" x="155" y="320">Larger position possible</text><text class="txt mid" x="565" y="215">Wide Stop</text><text class="txt small" x="565" y="270">Same 1R account risk</text><text class="txt small" x="565" y="320">Smaller position required</text></svg>
