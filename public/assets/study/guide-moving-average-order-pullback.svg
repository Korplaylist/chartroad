<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><g opacity=".75"><path class="grid" d="M95 150H865M95 230H865M95 310H865M95 390H865M180 110V430M320 110V430M460 110V430M600 110V430M740 110V430"/></g><text class="txt big" x="72" y="94">이동평균선 배열과 눌림</text><path class="up" d="M110 320L220 250L330 275L450 195L575 230L710 150L840 175"/><path class="muted" d="M110 350L250 315L390 285L530 250L680 220L840 195"/><path class="down" d="M110 390L260 360L420 330L590 300L740 270L840 250"/><text class="txt small" x="610" y="215">20일선 눌림 구간</text><text class="txt small" x="145" y="455">배열은 방향, 평균선 반응은 유지 여부를 확인</text></svg>
