<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><g opacity=".75"><path class="grid" d="M95 150H865M95 230H865M95 310H865M95 390H865M180 110V430M320 110V430M460 110V430M600 110V430M740 110V430"/></g><text class="txt big" x="72" y="94">익절 계획: 1차·2차 목표와 잔여 관리</text><path class="up" d="M120 360L250 310L390 330L520 245L650 205L810 135"/><path class="axis dash" d="M150 280H825M150 170H825M150 360H825"/><text class="txt mid" x="160" y="160">2차 목표</text><text class="txt mid" x="160" y="270">1차 목표</text><text class="txt mid" x="160" y="390">진입 기준</text><rect class="target" x="510" y="170" width="170" height="110" rx="14"/><text class="txt small" x="520" y="320">일부 익절 후 잔여 추세 관리</text></svg>
