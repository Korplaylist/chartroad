<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">상승 삼각형 패턴</title><desc id="d">수평 저항과 높아지는 저점, 상단 돌파를 표시한 교육 차트</desc><style>.b{fill:#f6f4ed}.p{fill:#fff;stroke:#d8ded6;stroke-width:2}.g{stroke:#ece9e1}.h{font:800 31px system-ui,sans-serif;fill:#10201f}.s{font:800 17px system-ui,sans-serif;fill:#0f766e}.l{font:800 17px system-ui,sans-serif;fill:#10201f}.n{font:700 14px system-ui,sans-serif;fill:#647067}.q{fill:none;stroke:#0f766e;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.x{stroke:#64748b;stroke-width:3;stroke-dasharray:10 9}.r{fill:none;stroke:#b45309;stroke-width:7;stroke-linecap:round}.v{fill:#0f766e}.o{fill:#b45309}</style><rect class="b" width="960" height="540" rx="28"/><rect class="p" x="38" y="38" width="884" height="464" rx="22"/><text x="72" y="82" class="s">가격 수렴 패턴</text><text x="72" y="122" class="h">상승 삼각형: 수평 저항과 높아지는 저점</text><path class="g" d="M100 190H860M100 280H860M100 370H860"/><path class="x" d="M120 205H770"/><path class="q" d="M120 360L225 205L330 325L430 205L525 285L620 205L700 250L770 205"/><path class="r" d="M770 205L835 135L870 112"/><text x="130" y="190" class="l">수평 저항</text><text x="470" y="322" class="l">저점 상승</text><text x="790" y="168" class="l">상단 돌파</text><g><rect class="v" x="145" y="420" width="28" height="40"/><rect class="v" x="315" y="430" width="28" height="30"/><rect class="v" x="500" y="438" width="28" height="22"/><rect class="o" x="790" y="392" width="28" height="68"/></g><text x="100" y="486" class="n">저점은 높아지고 상단은 고정됩니다. 종가 돌파와 거래량 증가를 함께 확인하세요.</text></svg>
