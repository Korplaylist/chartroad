<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><text class="txt big" x="72" y="94">꼬리는 밀림과 회복의 흔적</text><line class="axis" x1="260" y1="145" x2="260" y2="370"/><rect x="230" y="175" width="60" height="100" fill="#b45309" rx="8"/><line class="axis" x1="560" y1="145" x2="560" y2="370"/><rect x="530" y="255" width="60" height="95" fill="#0f766e" rx="8"/><text class="txt mid" x="170" y="420">윗꼬리: 위에서 밀림</text><text class="txt mid" x="470" y="420">아래꼬리: 아래에서 회복</text></svg>
