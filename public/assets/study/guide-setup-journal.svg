<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><text class="txt big" x="72" y="94">셋업과 복기 노트</text><rect class="panel" x="115" y="140" width="730" height="300" rx="16"/><path class="axis" d="M150 205H810M150 270H810M150 335H810M360 155V420"/><g class="txt small"><text x="170" y="185">진입 이유</text><text x="170" y="250">무효화 조건</text><text x="170" y="315">손절·목표</text><text x="170" y="380">복기 질문</text><text x="400" y="185">확인 가능한 문장으로 기록</text><text x="400" y="250">틀렸다고 볼 가격</text><text x="400" y="315">1R과 2R 계산</text><text x="400" y="380">기준을 지켰는가?</text></g></svg>
