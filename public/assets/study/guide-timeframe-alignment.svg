<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><text class="txt big" x="72" y="94">시간축 정렬: 주봉·일봉·분봉</text><rect class="zone" x="100" y="145" width="220" height="255" rx="18"/><rect class="panel" x="370" y="145" width="220" height="255" rx="18"/><rect class="risk" x="640" y="145" width="220" height="255" rx="18"/><path class="up" d="M130 330L185 260L245 285L295 210"/><path class="up" d="M400 315L455 250L515 270L565 205"/><path class="down" d="M670 235L725 270L790 240L835 310"/><text class="txt mid" x="145" y="440">주봉: 큰 방향</text><text class="txt mid" x="410" y="440">일봉: 판단 기준</text><text class="txt mid" x="675" y="440">분봉: 진입 위치</text></svg>
