<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"><rect width="960" height="540" rx="28" fill="#f6f4ed"/><rect x="38" y="38" width="884" height="464" rx="22" fill="#fff" stroke="#d8ded6" stroke-width="2"/><g font-family="system-ui,sans-serif"><text x="72" y="82" font-size="17" font-weight="800" fill="#0f766e">모멘텀 약화 패턴</text><text x="72" y="122" font-size="31" font-weight="800" fill="#10201f">하락 쐐기형: 하락폭 축소와 상단 돌파</text><path d="M130 150L790 375M130 295L790 395" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 9"/><path d="M130 150L230 295L340 190L455 335L565 255L675 370L790 320" fill="none" stroke="#0f766e" stroke-width="7" stroke-linejoin="round"/><path d="M790 320L850 210" fill="none" stroke="#b45309" stroke-width="8" stroke-linecap="round"/><text x="285" y="145" font-size="18" font-weight="800" fill="#10201f">고점 하락폭 축소</text><text x="560" y="425" font-size="18" font-weight="800" fill="#10201f">저점 하락폭 축소</text><text x="790" y="190" font-size="18" font-weight="800" fill="#10201f">상단 돌파</text><text x="100" y="475" font-size="14" font-weight="700" fill="#647067">가격은 내리지만 하락폭과 매도 거래량이 줄어드는지, 상단 돌파가 유지되는지 확인하세요.</text></g></svg>
