<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="t d"><title id="t">대칭 삼각형 패턴</title><desc id="d">낮아지는 고점과 높아지는 저점이 수렴하고 방향 이탈을 기다리는 교육 차트</desc><style>.b{fill:#f6f4ed}.p{fill:#fff;stroke:#d8ded6;stroke-width:2}.g{stroke:#ece9e1}.h{font:800 31px system-ui,sans-serif;fill:#10201f}.s{font:800 17px system-ui,sans-serif;fill:#0f766e}.l{font:800 17px system-ui,sans-serif;fill:#10201f}.n{font:700 14px system-ui,sans-serif;fill:#647067}.q{fill:none;stroke:#0f766e;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.x{stroke:#64748b;stroke-width:3;stroke-dasharray:10 9}.r{fill:none;stroke:#b45309;stroke-width:7;stroke-linecap:round}.v{fill:#0f766e}.o{fill:#b45309}</style><rect class="b" width="960" height="540" rx="28"/><rect class="p" x="38" y="38" width="884" height="464" rx="22"/><text x="72" y="82" class="s">가격 수렴 패턴</text><text x="72" y="122" class="h">대칭 삼각형: 예측보다 이탈 확인</text><path class="g" d="M100 190H860M100 280H860M100 370H860"/><path class="x" d="M120 175L760 278M120 390L760 278"/><path class="q" d="M120 175L220 390L330 210L430 355L530 238L620 325L700 260L760 278"/><path class="r" d="M760 278L835 220L870 205"/><text x="250" y="190" class="l">고점 하락</text><text x="250" y="378" class="l">저점 상승</text><text x="765" y="245" class="l">이탈 확인</text><g><rect class="v" x="145" y="420" width="28" height="40"/><rect class="v" x="315" y="430" width="28" height="30"/><rect class="v" x="500" y="438" width="28" height="22"/><rect class="o" x="790" y="398" width="28" height="62"/></g><text x="100" y="486" class="n">변동폭과 거래량이 줄어드는 수렴 구간입니다. 방향을 미리 정하지 말고 종가 이탈을 기다리세요.</text></svg>
