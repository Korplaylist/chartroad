<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><g opacity=".75"><path class="grid" d="M95 150H865M95 230H865M95 310H865M95 390H865M180 110V430M320 110V430M460 110V430M600 110V430M740 110V430"/></g><text class="txt big" x="72" y="94">캔들: 시가·고가·저가·종가와 위치</text><line class="axis" x1="250" y1="150" x2="250" y2="380"/><rect x="220" y="210" width="60" height="115" fill="#0f766e" rx="8"/><text class="txt small" x="305" y="160">고가</text><text class="txt small" x="305" y="220">종가</text><text class="txt small" x="305" y="325">시가</text><text class="txt small" x="305" y="385">저가</text><path class="axis dash" d="M520 180H825M520 355H825"/><path class="up" d="M520 340L625 260L735 190L825 230"/><text class="txt mid" x="520" y="430">색보다 네 가격과 위치를 먼저 확인</text></svg>
