<title id="title">과최적화 방지: 지표 조합을 너무 많이 쓰지 않는 법 차트 학습 이미지</title>
<desc id="desc">보조지표 주제를 실제 차트 흐름과 핵심 기준으로 설명하는 한국어 교육 이미지</desc>
<style>
