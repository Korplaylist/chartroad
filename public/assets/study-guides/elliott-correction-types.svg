<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img"><defs><style>.bg{fill:#f8f6ef}.panel{fill:#fff;stroke:#d8d7cd;stroke-width:2}.grid{stroke:#e8e5da;stroke-width:1}.axis{stroke:#98a39a;stroke-width:2}.up{stroke:#0f766e;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.down{stroke:#b45309;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}.muted{stroke:#647067;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#647067;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}.zone{fill:#0f766e;opacity:.10}.risk{fill:#b45309;opacity:.13}.target{fill:#0f766e;opacity:.16}.txt{font-family:Arial,sans-serif;fill:#142420;font-weight:700}.small{font-size:20px}.mid{font-size:28px}.big{font-size:38px}.note{font-size:18px;fill:#50605a;font-weight:600}.label{fill:#fff;font-size:16px;font-weight:700}</style></defs><rect class="bg" width="960" height="540" rx="28"/><rect class="panel" x="42" y="42" width="876" height="456" rx="22"/><text class="txt big" x="72" y="94">ABC Correction Types</text><g transform="translate(82 150)"><text class="txt mid" x="0" y="0">Zigzag</text><path class="down" d="M10 65L115 150L180 105L290 205"/><text class="note" x="12" y="235">Sharp 5-3-5 correction</text></g><g transform="translate(358 150)"><text class="txt mid" x="0" y="0">Flat</text><path class="muted" d="M10 105L105 170L195 105L290 180"/><path class="axis dash" d="M10 105H300"/><text class="note" x="12" y="235">Sideways 3-3-5 correction</text></g><g transform="translate(640 150)"><text class="txt mid" x="0" y="0">Triangle</text><path class="muted" d="M10 65L260 145M10 205L260 125"/><path class="up" d="M20 90L75 185L125 112L178 168L235 132"/><text class="note" x="12" y="235">Contracting range before break</text></g></svg>
