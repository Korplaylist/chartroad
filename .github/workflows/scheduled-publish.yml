name: Scheduled Publish Tick

on:
  workflow_dispatch:
  schedule:
    # KST 10:10. One morning tick publishes every article scheduled for that morning.
    - cron: "10 1 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: scheduled-publish
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check due posts
        id: publish-check
        run: node scripts/scheduled-publish-check.mjs

      - name: Trigger Cloudflare Pages rebuild when needed
        if: steps.publish-check.outputs.published == 'true'
        run: |
          git add .github/publish-state.json
          git commit -m "chore: publish scheduled articles"
          git push

      - name: Notify published article links
        if: steps.publish-check.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('.github/publish-notification.json', 'utf8'));
            const date = data.posts[0]?.publishedAt?.slice(0, 10) ?? new Date(data.checkedAt).toISOString().slice(0, 10);
            const links = data.posts.map((post) => `- ${post.publishedAt} · [${post.title}](${post.url})`).join('\n');
            const body = `## ${date} 예약 발행 완료\n\n${data.posts.length}개 글이 발행되었습니다.\n\n${links}\n\nCloudflare Pages 반영에는 약 1~2분이 걸릴 수 있습니다.`;
            const title = '차트로드 예약 발행 알림';
            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const existing = issues.data.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `예약 발행 결과와 글 주소가 날짜별 댓글로 기록됩니다.\n\n${body}`,
                assignees: [owner],
              });
            }
